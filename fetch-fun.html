<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetch Something Fun</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #2d2d2d;
        background: #fff7fb;
      }

      main {
        width: min(100%, 680px);
        padding: 28px;
        border: 2px solid #ffd2e4;
        border-radius: 8px;
        background: white;
        box-shadow: 0 12px 32px rgba(217, 107, 157, 0.14);
      }

      h1 {
        margin: 0 0 8px;
        color: #c85a8e;
      }

      p {
        margin: 0 0 20px;
        line-height: 1.6;
      }

      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
      }

      button {
        padding: 12px 18px;
        border: 0;
        border-radius: 8px;
        color: white;
        background: #d96b9d;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #b54d80;
      }

      button:focus-visible {
        outline: 3px solid rgba(181, 77, 128, 0.35);
        outline-offset: 3px;
      }

      #result {
        min-height: 140px;
        display: grid;
        place-items: center;
        padding: 20px;
        border: 2px dashed #f0aac9;
        border-radius: 8px;
        background: #fffafd;
        text-align: center;
      }

      #result img {
        max-width: 100%;
        max-height: 420px;
        border-radius: 8px;
      }

      .error {
        color: #a61b1b;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Fetch Something Fun</h1>
      <p>Click a button to fetch a programming joke or advice.</p>

      <div class="buttons">
        <button id="jokeButton" type="button">Joke</button>
        <button id="adviceButton" type="button">Advice</button>
        <button id="surpriseButton" type="button">Surprise me</button>
      </div>

      <div id="result" aria-live="polite">Your result will show up here.</div>
    </main>

    <script>
      const result = document.getElementById("result");
      const jokeButton = document.getElementById("jokeButton");
      const adviceButton = document.getElementById("adviceButton");
      const surpriseButton = document.getElementById("surpriseButton");

      let surpriseShowsJoke = true;

      function showLoading(label) {
        result.classList.remove("error");
        result.textContent = `Fetching ${label}...`;
      }

      function showError() {
        result.classList.add("error");
        result.textContent = "Something went wrong. Please try again.";
      }

      async function fetchJoke() {
        try {
          showLoading("a joke");
          const response = await fetch(
            "https://v2.jokeapi.dev/joke/Programming?type=single"
          );
          const data = await response.json();

          result.classList.remove("error");
          result.textContent = data.joke;
        } catch (error) {
          showError();
        }
      }

      async function fetchAdvice() {
        try {
          showLoading("advice");
          const response = await fetch("https://api.adviceslip.com/advice");
          const data = await response.json();

          result.classList.remove("error");
          result.textContent = data.slip.advice;
        } catch (error) {
          showError();
        }
      }

      function surpriseMe() {
        if (surpriseShowsJoke) {
          fetchJoke();
        } else {
          fetchAdvice();
        }

        surpriseShowsJoke = !surpriseShowsJoke;
      }

      jokeButton.addEventListener("click", fetchJoke);
      adviceButton.addEventListener("click", fetchAdvice);
      surpriseButton.addEventListener("click", surpriseMe);
    </script>
  </body>
</html>
