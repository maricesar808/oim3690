<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Data App</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        color: #2f2f2f;
        background: #fffafc;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 24px;
      }

      h1 {
        color: #d96b9d;
        font-size: 2.5rem;
        margin: 0 0 8px;
      }

      .intro {
        margin: 0 0 28px;
        font-size: 1.1rem;
      }

      #movie-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
      }

      .movie-card {
        background: white;
        border: 1px solid #f2d5e3;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
      }

      .movie-card h2 {
        margin: 0 0 10px;
        color: #b54d80;
        font-size: 1.35rem;
      }

      .movie-card p {
        margin: 8px 0;
        line-height: 1.5;
      }

      .rating {
        display: inline-block;
        margin-top: 10px;
        padding: 4px 10px;
        border-radius: 999px;
        color: white;
        background: #d96b9d;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Movie Night Picks</h1>
      <p class="intro">
        A tiny page rendered from local data stored in a separate JavaScript
        module.
      </p>
      <section id="movie-list" aria-label="Movie list"></section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
