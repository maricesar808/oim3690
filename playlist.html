<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 40px 16px;
        display: grid;
        place-items: start center;
        color: #263238;
        background: #f7fbff;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(100%, 680px);
        padding: 28px;
        background: white;
        border: 1px solid #dbe7f3;
        border-radius: 8px;
        box-shadow: 0 16px 40px rgba(38, 50, 56, 0.1);
      }

      h1 {
        margin: 0 0 20px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .song-form {
        display: flex;
        gap: 10px;
        margin-bottom: 22px;
      }

      input,
      button {
        min-height: 44px;
        border-radius: 8px;
        font: inherit;
      }

      input {
        flex: 1;
        min-width: 0;
        padding: 10px 12px;
        border: 1px solid #9fb4c7;
      }

      input:focus {
        border-color: #0b79d0;
        outline: 3px solid rgba(11, 121, 208, 0.18);
      }

      button {
        padding: 10px 18px;
        border: 0;
        color: white;
        background: #0b79d0;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #095fa3;
      }

      #playlist {
        margin: 0;
        padding-left: 22px;
      }

      #playlist li {
        margin-bottom: 10px;
      }

      .remix {
        color: #b42318;
        font-weight: 700;
      }

      @media (max-width: 460px) {
        .song-form {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Playlist</h1>

      <div class="song-form">
        <label for="song-input" class="visually-hidden">Song title</label>
        <input id="song-input" type="text" placeholder="Add a song" />
        <button id="add-song" type="button">Add song</button>
      </div>

      <ul id="playlist"></ul>
    </main>

    <script src="js/playlist.js"></script>
  </body>
</html>
