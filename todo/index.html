<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework Tracker</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff7fb;
      color: #172554;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 48px 16px;
      display: grid;
      place-items: start center;
      background:
        linear-gradient(rgba(219, 39, 119, 0.06) 1px, transparent 1px),
        #fff7fb;
      background-size: 100% 32px;
    }

    .app {
      width: min(100%, 760px);
      padding: 34px;
      background: white;
      border: 1px solid #fbcfe8;
      border-top: 8px solid #db2777;
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(131, 24, 67, 0.13);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 0 28px;
      color: #64748b;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: #db2777;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .todo-form {
      display: grid;
      grid-template-columns: 1.4fr 1fr auto auto;
      gap: 12px;
      margin-bottom: 28px;
      padding: 18px;
      background: #fff1f7;
      border: 1px solid #fbcfe8;
      border-radius: 16px;
    }

    .form-field {
      display: grid;
      gap: 6px;
    }

    .form-field label {
      color: #9d174d;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .add-button {
      align-self: end;
    }

    input,
    button {
      min-height: 44px;
      border-radius: 10px;
      font: inherit;
    }

    input {
      min-width: 0;
      padding: 10px 12px;
      color: #172554;
      background: white;
      border: 1px solid #f9a8d4;
    }

    input:focus {
      outline: 3px solid rgba(219, 39, 119, 0.15);
      border-color: #db2777;
    }

    button {
      padding: 10px 16px;
      border: 0;
      cursor: pointer;
      font-weight: 700;
    }

    button:focus-visible {
      outline: 3px solid rgba(219, 39, 119, 0.3);
      outline-offset: 2px;
    }

    .add-button {
      color: white;
      background: #db2777;
    }

    .add-button:hover {
      background: #be185d;
    }

    .toolbar {
      min-height: 44px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid #e2e8f0;
    }

    #task-count {
      color: #475569;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .clear-button {
      color: #b91c1c;
      background: #fee2e2;
    }

    .clear-button:hover {
      background: #fecaca;
    }

    .clear-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #todo-list {
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
      list-style: none;
    }

    .todo-item {
      padding: 16px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid #e2e8f0;
      border-left: 5px solid #db2777;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 4px 14px rgba(30, 41, 59, 0.05);
    }

    .todo-item.overdue {
      border-color: #fca5a5;
      background: #fff7f7;
    }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #db2777;
      cursor: pointer;
    }

    .task-name {
      display: block;
      overflow-wrap: anywhere;
      font-weight: 650;
    }

    .due-date {
      display: inline-block;
      margin-top: 7px;
      padding: 4px 8px;
      color: #475569;
      background: #f1f5f9;
      border-radius: 999px;
      font-size: 0.85rem;
    }

    .subject {
      display: block;
      margin-top: 3px;
      color: #db2777;
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .overdue .due-date {
      color: #b91c1c;
      font-weight: 700;
    }

    .completed .task-name {
      color: #9ca3af;
      text-decoration: line-through;
    }

    .completed .due-date {
      color: #9ca3af;
    }

    .delete-button {
      min-height: 36px;
      padding: 7px 10px;
      color: #6b7280;
      background: transparent;
      font-size: 1.1rem;
      line-height: 1;
    }

    .delete-button:hover {
      color: #b91c1c;
      background: #fee2e2;
    }

    .empty-state {
      padding: 32px 16px;
      color: #94a3b8;
      text-align: center;
      background: #fffafd;
      border: 2px dashed #f9a8d4;
      border-radius: 14px;
    }

    @media (max-width: 580px) {
      .app {
        padding: 22px 18px;
      }

      .todo-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <p class="eyebrow">Study dashboard</p>
    <h1>Homework Tracker</h1>
    <p class="subtitle">Keep every assignment, class, and deadline in one place.</p>

    <form class="todo-form" id="todo-form">
      <div class="form-field">
        <label for="task-input">Assignment</label>
        <input
          type="text"
          id="task-input"
          placeholder="e.g. Finish chapter 6"
          autocomplete="off"
          required
        >
      </div>
      <div class="form-field">
        <label for="subject-input">Class</label>
        <input
          type="text"
          id="subject-input"
          placeholder="e.g. Biology"
          autocomplete="off"
          required
        >
      </div>
      <div class="form-field">
        <label for="due-date">Due date</label>
        <input type="date" id="due-date" required>
      </div>
      <button class="add-button" type="submit">Add homework</button>
    </form>

    <div class="toolbar">
      <span id="task-count" aria-live="polite">0 assignments</span>
      <button class="clear-button" id="clear-all" type="button">Clear tracker</button>
    </div>

    <ul id="todo-list" aria-label="Homework assignments"></ul>
  </main>

  <script src="script.js"></script>
</body>
</html>
